<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #070b12;
    --surface1:  #0c1220;
    --surface2:  #111827;
    --surface3:  #1a2236;
    --border:    #1e2d45;
    --border2:   #243450;
    --blue:      #4a8fff;
    --green:     #05d98a;
    --red:       #ff4060;
    --orange:    #ff9240;
    --amber:     #ffb020;
    --purple:    #9b6dff;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --muted2:    #8899bb;
    --mono:      'DM Mono', monospace;
    --head:      'Cabinet Grotesk', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--head);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,143,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,143,255,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(74,143,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 28px 24px 80px; }

  /* ─── HEADER ─── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
    opacity: 0; animation: fadeUp .5s .05s ease forwards;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 42px; height: 42px; border-radius: 10px;
    background: linear-gradient(135deg, #4a8fff22, #9b6dff22);
    border: 1px solid #4a8fff44;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
  .header-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .refresh-info { text-align: right; }
  .last-updated { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .countdown { font-size: 12px; color: var(--muted2); font-family: var(--mono); margin-top: 3px; }
  .countdown span { color: var(--blue); font-weight: 500; }
  .refresh-btn {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--blue);
    font-family: var(--mono); font-size: 12px; padding: 8px 16px; border-radius: 8px;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { background: #4a8fff15; border-color: var(--blue); }
  .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── KPI CARDS ─── */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--surface1); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 22px;
    opacity: 0; animation: fadeUp .5s ease forwards;
    position: relative; overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .kpi-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    border-radius: 14px 14px 0 0;
  }
  .kpi-card:nth-child(1)::before { background: linear-gradient(90deg, var(--blue), var(--purple)); }
  .kpi-card:nth-child(2)::before { background: linear-gradient(90deg, var(--green), var(--blue)); }
  .kpi-card:nth-child(3)::before { background: linear-gradient(90deg, var(--amber), var(--orange)); }
  .kpi-card:nth-child(4)::before { background: linear-gradient(90deg, var(--purple), var(--blue)); }
  .kpi-card:nth-child(1) { animation-delay: .1s; }
  .kpi-card:nth-child(2) { animation-delay: .15s; }
  .kpi-card:nth-child(3) { animation-delay: .2s; }
  .kpi-card:nth-child(4) { animation-delay: .25s; }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 10px; }
  .kpi-value { font-size: 26px; font-weight: 800; line-height: 1; letter-spacing: -.5px; }
  .kpi-sub { font-size: 12px; color: var(--muted2); margin-top: 6px; font-family: var(--mono); }
  .kpi-icon { position: absolute; top: 18px; right: 18px; font-size: 20px; opacity: .25; }

  /* ─── MAIN GRID ─── */
  .main-grid {
    display: grid; grid-template-columns: 1fr 340px; gap: 16px;
  }

  /* ─── TABLE PANEL ─── */
  .panel {
    background: var(--surface1); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    opacity: 0; animation: fadeUp .5s .3s ease forwards;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; border-bottom: 1px solid var(--border);
  }
  .panel-title { font-size: 14px; font-weight: 700; letter-spacing: -.1px; }
  .panel-badge {
    font-size: 11px; font-family: var(--mono); color: var(--muted2);
    background: var(--surface2); border: 1px solid var(--border); padding: 3px 9px; border-radius: 20px;
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted);
    font-family: var(--mono); font-weight: 500;
    padding: 10px 22px; text-align: right; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody tr {
    cursor: pointer; transition: background .15s;
    border-bottom: 1px solid rgba(30,45,69,.5);
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:not(.total-row):hover { background: rgba(74,143,255,.04); }
  tbody tr:not(.total-row):hover td:first-child .ticker-name { color: var(--blue); }
  td {
    padding: 14px 22px; font-family: var(--mono); font-size: 13px;
    text-align: right; white-space: nowrap;
  }
  td:first-child { text-align: left; }
  .ticker-badge {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .ticker-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .ticker-name { font-family: var(--head); font-weight: 700; font-size: 14px; letter-spacing: -.2px; }
  .ticker-lots { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }
  .gain-pos { color: var(--green); }
  .gain-neg { color: var(--red); }
  .total-row td { background: var(--surface2); font-weight: 500; border-top: 1px solid var(--border2); }
  .total-row td:first-child { font-family: var(--head); font-weight: 700; font-size: 13px; }

  /* ─── CHART PANEL ─── */
  .chart-panel {
    background: var(--surface1); border: 1px solid var(--border); border-radius: 14px;
    opacity: 0; animation: fadeUp .5s .35s ease forwards;
    display: flex; flex-direction: column;
  }
  .donut-wrap {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px;
  }
  #donutCanvas { max-width: 220px; max-height: 220px; }
  .donut-legend { width: 100%; padding: 0 20px 20px; }
  .legend-item {
    display: flex; align-items: center; gap: 10px; padding: 6px 0;
    border-bottom: 1px solid rgba(30,45,69,.5); font-family: var(--mono); font-size: 12px;
    cursor: pointer; transition: opacity .15s;
  }
  .legend-item:last-child { border-bottom: none; }
  .legend-item:hover { opacity: .75; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-ticker { flex: 1; color: var(--muted2); }
  .legend-pct { color: var(--text); font-weight: 500; }
  .legend-val { color: var(--muted); font-size: 11px; }

  /* ─── DRAWER ─── */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(7,11,18,.7); backdrop-filter: blur(4px);
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
    background: var(--surface1); border-top: 1px solid var(--border2);
    border-radius: 20px 20px 0 0; max-height: 90vh; overflow-y: auto;
    transform: translateY(100%); transition: transform .35s cubic-bezier(.22,.68,0,1.2);
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  .drawer.open { transform: translateY(0); }
  .drawer-handle {
    width: 40px; height: 4px; background: var(--border2); border-radius: 2px;
    margin: 14px auto 0; cursor: pointer;
  }
  .drawer-content { padding: 20px 28px 40px; }
  .drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .drawer-title { display: flex; align-items: center; gap: 12px; }
  .drawer-ticker { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
  .drawer-label { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .drawer-close {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted2);
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; transition: all .2s;
  }
  .drawer-close:hover { color: var(--text); border-color: var(--border2); }

  /* Drawer KPI mini cards */
  .drawer-kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 22px;
  }
  .mini-kpi {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  }
  .mini-kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; }
  .mini-kpi-value { font-size: 16px; font-weight: 700; font-family: var(--mono); letter-spacing: -.3px; }

  /* Avg cost bar */
  .avg-cost-section { margin-bottom: 22px; }
  .avg-cost-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; font-weight: 600; }
  .avg-cost-bar-wrap {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
  }
  .avg-cost-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-family: var(--mono); font-size: 12px; }
  .avg-cost-track {
    height: 6px; background: var(--surface3); border-radius: 3px; position: relative; overflow: visible;
  }
  .avg-cost-fill {
    height: 100%; border-radius: 3px; position: relative;
    background: linear-gradient(90deg, var(--blue), var(--green));
    transition: width .6s ease;
  }
  .avg-cost-marker {
    position: absolute; top: -4px; width: 2px; height: 14px; border-radius: 1px;
  }

  /* Dumbbell chart */
  .dumbbell-section { margin-bottom: 22px; }
  .dumbbell-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; font-weight: 600; }
  #dumbbellCanvas { width: 100%; display: block; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }

  /* Lot dist bar */
  .dist-section { margin-bottom: 22px; }
  .dist-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; font-weight: 600; }
  .dist-bar { height: 10px; border-radius: 5px; overflow: hidden; display: flex; }
  .dist-seg { height: 100%; transition: opacity .2s; }
  .dist-seg:hover { opacity: .7; }
  .dist-legend { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .dist-leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--mono); color: var(--muted2); }
  .dist-leg-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* Lots table */
  .lots-section {}
  .lots-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; font-weight: 600; }
  .lots-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  .lots-table { width: 100%; border-collapse: collapse; }
  .lots-table th {
    font-size: 10px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted);
    font-family: var(--mono); padding: 9px 14px; text-align: right; border-bottom: 1px solid var(--border);
    background: var(--surface2); white-space: nowrap;
  }
  .lots-table th:first-child { text-align: left; }
  .lots-table td {
    font-size: 12px; font-family: var(--mono); padding: 10px 14px;
    text-align: right; border-bottom: 1px solid rgba(30,45,69,.4);
  }
  .lots-table td:first-child { text-align: left; }
  .lots-table tr:last-child td { border-bottom: none; }
  .lots-table tbody tr { background: var(--surface1); transition: background .15s; }
  .lots-table tbody tr:hover { background: rgba(74,143,255,.04); }
  .lot-num { display: inline-block; background: var(--surface3); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--muted2); }

  /* Status indicator */
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    display: inline-block; margin-right: 5px;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.error { background: var(--red); animation: none; }
  .status-dot.loading { background: var(--amber); }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: .3; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 1100px) {
    .main-grid { grid-template-columns: 1fr; }
    .chart-panel { order: -1; }
    .donut-wrap { flex-direction: row; gap: 20px; padding: 20px 20px 10px; }
    #donutCanvas { max-width: 140px; max-height: 140px; }
    .donut-legend { padding: 0 20px 16px; }
  }
  @media (max-width: 720px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .drawer-kpis { grid-template-columns: repeat(2, 1fr); }
    .kpi-value { font-size: 20px; }
    .app { padding: 16px 14px 60px; }
    .drawer-content { padding: 16px 16px 36px; }
    td { padding: 12px 14px; }
    thead th { padding: 10px 14px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">📊</div>
      <div>
        <div class="header-title">Portfolio Terminal</div>
        <div class="header-sub">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Fetching live prices…</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="refresh-info">
        <div class="last-updated" id="lastUpdated">—</div>
        <div class="countdown">Next refresh in <span id="countdown">60s</span></div>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- KPI CARDS -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Total Portfolio Value</div>
      <div class="kpi-value" id="kpiTotal">—</div>
      <div class="kpi-sub" id="kpiTotalSub">Loading…</div>
      <div class="kpi-icon">💼</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Gain / Loss</div>
      <div class="kpi-value" id="kpiGain">—</div>
      <div class="kpi-sub" id="kpiGainSub">Loading…</div>
      <div class="kpi-icon">📈</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Best Performer</div>
      <div class="kpi-value" id="kpiBest">—</div>
      <div class="kpi-sub" id="kpiBestSub">Loading…</div>
      <div class="kpi-icon">🏆</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Lots</div>
      <div class="kpi-value" id="kpiLots">18</div>
      <div class="kpi-sub" id="kpiLotsSub">5 assets</div>
      <div class="kpi-icon">📋</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- Holdings Table -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Holdings</div>
        <div class="panel-badge" id="portfolioBadge">Click a row for detail</div>
      </div>
      <div style="overflow-x:auto;">
        <table id="holdingsTable">
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Units</th>
              <th>Avg. Cost</th>
              <th>Current Price</th>
              <th>Value</th>
              <th>Gain €</th>
              <th>Gain %</th>
            </tr>
          </thead>
          <tbody id="holdingsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Donut Chart -->
    <div class="chart-panel panel">
      <div class="panel-header">
        <div class="panel-title">Allocation</div>
        <div class="panel-badge">by market value</div>
      </div>
      <div class="donut-wrap">
        <canvas id="donutCanvas" width="220" height="220"></canvas>
      </div>
      <div class="donut-legend" id="donutLegend"></div>
    </div>

  </div><!-- /main-grid -->
</div><!-- /app -->

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-content" id="drawerContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PORTFOLIO DATA
// ═══════════════════════════════════════════════════════════════
const PORTFOLIO = {

    ]
  },

      { date: '09.08.2023', units: 2,  price: 381.10 },

    ]
  },
  BTC: {
    name: 'Bitcoin', color: '#ffb020',
    lots: [
      { date: '15.01.2022', units: 0.08, price: 38200 },
      { date: '20.06.2022', units: 0.15, price: 19400 },
      { date: '18.11.2022', units: 0.20, price: 15600 },
      { date: '10.03.2023', units: 0.12, price: 22800 },
      { date: '28.10.2023', units: 0.10, price: 33400 },
    ]
  }
};

// Fallback prices (EUR)
const FALLBACK_PRICES = {
  'AAPL': 178.50,
  'MSFT': 356.20,
  'VOO':  435.60,
  'NVDA': 820.40,
  'BTC':  58400
};

// Yahoo Finance ticker symbols
const YF_SYMBOLS = {
  'AAPL': 'AAPL-EUR',
  'MSFT': 'MSFT-EUR',
  'VOO':  'VOO-EUR',
  'NVDA': 'NVDA-EUR',
  'BTC':  'BTC-EUR'
};

let livePrices = { ...FALLBACK_PRICES };
let countdownVal = 60;
let countdownTimer = null;
let refreshTimer = null;

// ═══════════════════════════════════════════════════════════════
// PRICE FETCHING
// ═══════════════════════════════════════════════════════════════
async function fetchYahooPrice(ticker) {
  const yfTicker = YF_SYMBOLS[ticker];
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${yfTicker}?interval=1d&range=1d`;

  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
  ];

  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      let data = await res.json();
      // allorigins wraps in .contents
      if (data.contents) data = JSON.parse(data.contents);
      const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price && price > 0) return price;
    } catch (e) { /* try next */ }
  }
  return null;
}

async function fetchAllPrices() {
  setStatus('loading', 'Fetching live prices…');
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  let anyLive = false;
  const results = await Promise.allSettled(
    Object.keys(PORTFOLIO).map(async t => {
      const p = await fetchYahooPrice(t);
      return { ticker: t, price: p };
    })
  );

  results.forEach(r => {
    if (r.status === 'fulfilled' && r.value.price) {
      livePrices[r.value.ticker] = r.value.price;
      anyLive = true;
    }
  });

  btn.classList.remove('spinning');
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    'Updated ' + now.toLocaleTimeString('en-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  if (anyLive) {
    setStatus('live', 'Live prices');
  } else {
    setStatus('error', 'Fallback prices (offline)');
  }

  renderAll();
  startCountdown();
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot' + (state === 'error' ? ' error' : state === 'loading' ? ' loading' : '');
  txt.textContent = text;
}

function startCountdown() {
  clearInterval(countdownTimer);
  clearTimeout(refreshTimer);
  countdownVal = 60;
  updateCountdown();
  countdownTimer = setInterval(() => {
    countdownVal--;
    updateCountdown();
    if (countdownVal <= 0) { clearInterval(countdownTimer); }
  }, 1000);
  refreshTimer = setTimeout(fetchAllPrices, 60000);
}

function updateCountdown() {
  document.getElementById('countdown').textContent = countdownVal + 's';
}

function doRefresh() {
  clearInterval(countdownTimer);
  clearTimeout(refreshTimer);
  fetchAllPrices();
}

// ═══════════════════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════════════════
function calcAsset(ticker) {
  const asset = PORTFOLIO[ticker];
  const price = livePrices[ticker];
  let totalUnits = 0, totalCost = 0;
  asset.lots.forEach(lot => {
    totalUnits += lot.units;
    totalCost  += lot.units * lot.price;
  });
  const avgCost   = totalCost / totalUnits;
  const value     = totalUnits * price;
  const gain      = value - totalCost;
  const gainPct   = (gain / totalCost) * 100;
  return { ticker, name: asset.name, color: asset.color, lots: asset.lots, totalUnits, totalCost, avgCost, price, value, gain, gainPct };
}

function calcAll() {
  return Object.keys(PORTFOLIO).map(calcAsset);
}

// ═══════════════════════════════════════════════════════════════
// FORMATTING
// ═══════════════════════════════════════════════════════════════
const fmtEur = (v, dec = 2) =>
  '€' + v.toLocaleString('en-DE', { minimumFractionDigits: dec, maximumFractionDigits: dec });
const fmtNum = (v, dec = 2) =>
  v.toLocaleString('en-DE', { minimumFractionDigits: dec, maximumFractionDigits: dec });
const fmtPct = v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
const fmtUnits = (v, ticker) => ticker === 'BTC' ? v.toFixed(4) : v.toFixed(0);
const fmtSmart = (v) => v >= 1000 ? '€' + (v/1000).toFixed(1) + 'K' : fmtEur(v);

function gainClass(v) { return v >= 0 ? 'gain-pos' : 'gain-neg'; }

// ═══════════════════════════════════════════════════════════════
// RENDER HOLDINGS TABLE
// ═══════════════════════════════════════════════════════════════
function renderTable(assets) {
  const body = document.getElementById('holdingsBody');
  let totalVal = 0, totalCost = 0, totalGain = 0;
  let html = '';

  assets.forEach(a => {
    totalVal  += a.value;
    totalCost += a.totalCost;
    totalGain += a.gain;

    html += `<tr onclick="openDrawer('${a.ticker}')">
      <td>
        <div class="ticker-badge">
          <div class="ticker-dot" style="background:${a.color}"></div>
          <div>
            <div class="ticker-name">${a.ticker}</div>
            <div class="ticker-lots">${a.lots.length} lot${a.lots.length>1?'s':''}</div>
          </div>
        </div>
      </td>
      <td>${fmtUnits(a.totalUnits, a.ticker)}</td>
      <td>${fmtSmart(a.avgCost)}</td>
      <td>${fmtSmart(a.price)}</td>
      <td>${fmtEur(a.value, 0)}</td>
      <td class="${gainClass(a.gain)}">${a.gain >= 0 ? '+' : ''}${fmtEur(a.gain, 0)}</td>
      <td class="${gainClass(a.gainPct)}">${fmtPct(a.gainPct)}</td>
    </tr>`;
  });

  const totalGainPct = ((totalVal - totalCost) / totalCost) * 100;
  html += `<tr class="total-row">
    <td>Total Portfolio</td>
    <td>—</td><td>—</td><td>—</td>
    <td>${fmtEur(totalVal, 0)}</td>
    <td class="${gainClass(totalGain)}">${totalGain >= 0 ? '+' : ''}${fmtEur(totalGain, 0)}</td>
    <td class="${gainClass(totalGainPct)}">${fmtPct(totalGainPct)}</td>
  </tr>`;

  body.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// RENDER KPI CARDS
// ═══════════════════════════════════════════════════════════════
function renderKPIs(assets) {
  let totalVal = 0, totalCost = 0;
  assets.forEach(a => { totalVal += a.value; totalCost += a.totalCost; });
  const totalGain = totalVal - totalCost;
  const totalGainPct = (totalGain / totalCost) * 100;

  document.getElementById('kpiTotal').textContent = fmtEur(totalVal, 0);
  document.getElementById('kpiTotalSub').textContent = 'Cost basis ' + fmtEur(totalCost, 0);

  const kpiGain = document.getElementById('kpiGain');
  kpiGain.textContent = (totalGain >= 0 ? '+' : '') + fmtEur(totalGain, 0);
  kpiGain.className = 'kpi-value ' + gainClass(totalGain);
  document.getElementById('kpiGainSub').textContent = fmtPct(totalGainPct) + ' all time';

  const best = assets.reduce((b, a) => a.gainPct > b.gainPct ? a : b, assets[0]);
  document.getElementById('kpiBest').textContent = best.ticker;
  document.getElementById('kpiBestSub').innerHTML = `<span class="gain-pos">${fmtPct(best.gainPct)}</span> return`;

  const totalLots = assets.reduce((s, a) => s + a.lots.length, 0);
  document.getElementById('kpiLots').textContent = totalLots;
  document.getElementById('kpiLotsSub').textContent = assets.length + ' assets';
}

// ═══════════════════════════════════════════════════════════════
// DONUT CHART
// ═══════════════════════════════════════════════════════════════
function renderDonut(assets) {
  const canvas = document.getElementById('donutCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const outerR = Math.min(W, H) / 2 - 4;
  const innerR = outerR * 0.62;

  const totalVal = assets.reduce((s, a) => s + a.value, 0);
  const slices = assets.map(a => ({ ...a, pct: a.value / totalVal }));

  ctx.clearRect(0, 0, W, H);

  let angle = -Math.PI / 2;
  const GAP = 0.018;
  slices.forEach(s => {
    const sweep = s.pct * (Math.PI * 2) - GAP;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, outerR, angle + GAP/2, angle + sweep + GAP/2);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.fill();

    // inner ring glow
    ctx.beginPath();
    ctx.arc(cx, cy, innerR + 2, angle + GAP/2, angle + sweep + GAP/2);
    ctx.arc(cx, cy, innerR - 2, angle + sweep + GAP/2, angle + GAP/2, true);
    ctx.closePath();
    ctx.fillStyle = s.color + '22';
    ctx.fill();

    angle += s.pct * Math.PI * 2;
  });

  // Hole
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface1').trim() || '#0c1220';
  ctx.fill();

  // Center text
  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 13px "Cabinet Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(fmtEur(totalVal, 0).replace('€', '€'), cx, cy - 8);
  ctx.fillStyle = '#64748b';
  ctx.font = '10px "DM Mono", monospace';
  ctx.fillText('total value', cx, cy + 10);

  // Legend
  const legend = document.getElementById('donutLegend');
  legend.innerHTML = slices.map(s => `
    <div class="legend-item" onclick="openDrawer('${s.ticker}')">
      <div class="legend-dot" style="background:${s.color}"></div>
      <span class="legend-ticker">${s.ticker}</span>
      <span class="legend-pct">${(s.pct * 100).toFixed(1)}%</span>
      <span class="legend-val">${fmtEur(s.value, 0)}</span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════════════════════════════
function openDrawer(ticker) {
  const asset = calcAsset(ticker);
  const content = buildDrawerContent(asset);
  document.getElementById('drawerContent').innerHTML = content;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => drawDumbbell(asset), 80);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function buildDrawerContent(a) {
  // Mini KPIs
  const miniKpis = `
    <div class="drawer-kpis">
      <div class="mini-kpi">
        <div class="mini-kpi-label">Current Price</div>
        <div class="mini-kpi-value">${fmtSmart(a.price)}</div>
      </div>
      <div class="mini-kpi">
        <div class="mini-kpi-label">Total Units</div>
        <div class="mini-kpi-value">${fmtUnits(a.totalUnits, a.ticker)}</div>
      </div>
      <div class="mini-kpi">
        <div class="mini-kpi-label">Current Value</div>
        <div class="mini-kpi-value">${fmtEur(a.value, 0)}</div>
      </div>
      <div class="mini-kpi">
        <div class="mini-kpi-label">Total Gain/Loss</div>
        <div class="mini-kpi-value ${gainClass(a.gain)}">${a.gain>=0?'+':''}${fmtEur(a.gain, 0)}</div>
      </div>
    </div>`;

  // Avg cost bar
  const maxPrice = Math.max(a.avgCost, a.price) * 1.15;
  const avgPct  = Math.min((a.avgCost / maxPrice) * 100, 100);
  const curPct  = Math.min((a.price   / maxPrice) * 100, 100);
  const fillPct = Math.min(curPct, 100);
  const avgCostBar = `
    <div class="avg-cost-section">
      <div class="avg-cost-label">Weighted Avg. Cost vs Current Price</div>
      <div class="avg-cost-bar-wrap">
        <div class="avg-cost-row">
          <span style="color:var(--muted2)">Avg. Cost <span style="color:var(--text);font-weight:600">${fmtSmart(a.avgCost)}</span></span>
          <span style="color:var(--muted2)">Current <span class="${gainClass(a.gain)};font-weight:600" style="color:${a.gain>=0?'var(--green)':'var(--red)'}">${fmtSmart(a.price)}</span></span>
        </div>
        <div class="avg-cost-track">
          <div class="avg-cost-fill" style="width:${fillPct}%"></div>
          <div class="avg-cost-marker" style="left:${avgPct}%;background:var(--blue);"></div>
          <div class="avg-cost-marker" style="left:${curPct}%;background:${a.gain>=0?'var(--green)':'var(--red)'};"></div>
        </div>
        <div class="avg-cost-row" style="margin-top:8px;margin-bottom:0;">
          <span style="color:var(--muted);font-size:10px;">
            <span style="display:inline-block;width:8px;height:2px;background:var(--blue);margin-right:4px;vertical-align:middle;"></span>Avg cost
          </span>
          <span style="color:var(--muted);font-size:10px;">
            <span style="display:inline-block;width:8px;height:2px;background:${a.gain>=0?'var(--green)':'var(--red)'};margin-right:4px;vertical-align:middle;"></span>Current price
          </span>
        </div>
      </div>
    </div>`;

  // Lot distribution bar
  const segColors = ['#4a8fff','#9b6dff','#05d98a','#ff9240','#ffb020'];
  const distSegs = a.lots.map((lot, i) => {
    const pct = (lot.units / a.totalUnits * 100).toFixed(1);
    return `<div class="dist-seg" style="width:${pct}%;background:${segColors[i % segColors.length]}" title="Lot ${i+1}: ${lot.units} units"></div>`;
  }).join('');
  const distLeg = a.lots.map((lot, i) => {
    const pct = (lot.units / a.totalUnits * 100).toFixed(1);
    return `<div class="dist-leg-item"><div class="dist-leg-dot" style="background:${segColors[i % segColors.length]}"></div>L${i+1}: ${pct}%</div>`;
  }).join('');
  const distBar = `
    <div class="dist-section">
      <div class="dist-label">Lot Distribution (by units)</div>
      <div class="dist-bar">${distSegs}</div>
      <div class="dist-legend">${distLeg}</div>
    </div>`;

  // Lots table
  const lotsRows = a.lots.map((lot, i) => {
    const costBasis  = lot.units * lot.price;
    const curVal     = lot.units * a.price;
    const lotGain    = curVal - costBasis;
    const lotGainPct = (lotGain / costBasis) * 100;
    return `<tr>
      <td><span class="lot-num">L${i+1}</span></td>
      <td>${lot.date}</td>
      <td>${fmtUnits(lot.units, a.ticker)}</td>
      <td>${fmtSmart(lot.price)}</td>
      <td>${fmtEur(costBasis, 0)}</td>
      <td>${fmtEur(curVal, 0)}</td>
      <td class="${gainClass(lotGain)}">${lotGain>=0?'+':''}${fmtEur(lotGain, 0)}</td>
      <td class="${gainClass(lotGainPct)}">${fmtPct(lotGainPct)}</td>
    </tr>`;
  }).join('');

  const lotsTable = `
    <div class="lots-section">
      <div class="lots-label">Individual Lots</div>
      <div class="lots-table-wrap">
        <table class="lots-table">
          <thead><tr>
            <th>#</th><th>Date</th><th>Units</th><th>Buy Price</th>
            <th>Cost Basis</th><th>Cur. Value</th><th>Gain €</th><th>Gain %</th>
          </tr></thead>
          <tbody>${lotsRows}</tbody>
        </table>
      </div>
    </div>`;

  return `
    <div class="drawer-header">
      <div class="drawer-title">
        <div class="ticker-dot" style="background:${a.color};width:14px;height:14px;border-radius:4px;"></div>
        <div>
          <div class="drawer-ticker" style="color:${a.color}">${a.ticker}</div>
          <div class="drawer-label">${a.name}</div>
        </div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    ${miniKpis}
    ${avgCostBar}
    <div class="dumbbell-section">
      <div class="dumbbell-label">Lot-by-Lot Buy Price vs Current Price</div>
      <canvas id="dumbbellCanvas"></canvas>
    </div>
    ${distBar}
    ${lotsTable}
  `;
}

// ═══════════════════════════════════════════════════════════════
// DUMBBELL CHART (Canvas)
// ═══════════════════════════════════════════════════════════════
function drawDumbbell(a) {
  const canvas = document.getElementById('dumbbellCanvas');
  if (!canvas) return;

  const lots = a.lots;
  const currentPrice = a.price;
  const avgCost = a.avgCost;

  const ROW_H  = 70;
  const PAD_L  = 70;
  const PAD_R  = 70;
  const PAD_T  = 30;
  const PAD_B  = 30;
  const W_CSS  = canvas.parentElement.clientWidth - 2;
  const H_CSS  = PAD_T + lots.length * ROW_H + PAD_B;

  const DPR    = window.devicePixelRatio || 1;
  canvas.width  = W_CSS * DPR;
  canvas.height = H_CSS * DPR;
  canvas.style.width  = W_CSS + 'px';
  canvas.style.height = H_CSS + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // Background
  ctx.fillStyle = '#111827';
  ctx.fillRect(0, 0, W_CSS, H_CSS);

  // Price range
  const allPrices = [...lots.map(l => l.price), currentPrice, avgCost];
  const minP = Math.min(...allPrices) * 0.92;
  const maxP = Math.max(...allPrices) * 1.08;
  const priceToX = p => PAD_L + ((p - minP) / (maxP - minP)) * (W_CSS - PAD_L - PAD_R);

  const maxUnits = Math.max(...lots.map(l => l.units));

  // Vertical dashed lines: avg cost and current price
  const drawDashedLine = (x, color) => {
    ctx.save();
    ctx.setLineDash([4, 5]);
    ctx.strokeStyle = color + 'aa';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, PAD_T - 10);
    ctx.lineTo(x, H_CSS - PAD_B + 10);
    ctx.stroke();
    ctx.restore();
  };

  const xAvg = priceToX(avgCost);
  const xCur = priceToX(currentPrice);
  drawDashedLine(xAvg, '#4a8fff');
  drawDashedLine(xCur, currentPrice >= avgCost ? '#05d98a' : '#ff4060');

  // Top axis labels
  ctx.fillStyle = '#4a8fff99';
  ctx.font = '10px "DM Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('avg', xAvg, PAD_T - 12);
  ctx.fillStyle = (currentPrice >= avgCost ? '#05d98a' : '#ff4060') + 'aa';
  ctx.fillText('now', xCur, PAD_T - 12);

  lots.forEach((lot, i) => {
    const y  = PAD_T + i * ROW_H + ROW_H / 2;
    const xB = priceToX(lot.price);
    const xC = priceToX(currentPrice);
    const isGain = currentPrice >= lot.price;
    const lineColor = isGain ? '#05d98a' : '#ff4060';
    const lotGainPct = ((currentPrice - lot.price) / lot.price) * 100;
    const unitRatio  = lot.units / maxUnits;
    const dotR       = 6 + unitRatio * 8;

    // Row background stripe (subtle)
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(0,0,0,0.1)';
    ctx.fillRect(0, y - ROW_H / 2, W_CSS, ROW_H);

    // Lot label (left)
    ctx.fillStyle = '#64748b';
    ctx.font = '10px "DM Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`L${i+1}`, PAD_L - 10, y + 4);

    // Connecting line
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.7;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(xB, y);
    ctx.lineTo(xC, y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Buy dot (blue)
    ctx.beginPath();
    ctx.arc(xB, y, dotR, 0, Math.PI * 2);
    ctx.fillStyle = '#4a8fff';
    ctx.fill();
    ctx.strokeStyle = '#070b12';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Current dot
    ctx.beginPath();
    ctx.arc(xC, y, dotR * 0.85, 0, Math.PI * 2);
    ctx.fillStyle = lineColor;
    ctx.fill();
    ctx.strokeStyle = '#070b12';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Buy price label
    const buyLabel = fmtSmart(lot.price);
    ctx.font = '10px "DM Mono", monospace';
    ctx.fillStyle = '#8899bb';
    const labelOffset = dotR + 5;
    if (xB < xC) {
      ctx.textAlign = 'right';
      ctx.fillText(buyLabel, xB - labelOffset, y - dotR - 3);
    } else {
      ctx.textAlign = 'left';
      ctx.fillText(buyLabel, xB + labelOffset, y - dotR - 3);
    }

    // % gain label near current dot
    const pctLabel = (lotGainPct >= 0 ? '+' : '') + lotGainPct.toFixed(1) + '%';
    ctx.fillStyle = lineColor;
    ctx.font = '9px "DM Mono", monospace';
    if (xC >= xB) {
      ctx.textAlign = 'left';
      ctx.fillText(pctLabel, xC + dotR + 4, y + 4);
    } else {
      ctx.textAlign = 'right';
      ctx.fillText(pctLabel, xC - dotR - 4, y + 4);
    }

    // Date label
    ctx.fillStyle = '#374151';
    ctx.font = '9px "DM Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(lot.date, xB, y + dotR + 13);
  });

  // X-axis price ticks (bottom)
  ctx.fillStyle = '#374151';
  ctx.font = '9px "DM Mono", monospace';
  ctx.textAlign = 'center';
  const ticks = 5;
  for (let i = 0; i <= ticks; i++) {
    const p = minP + (maxP - minP) * (i / ticks);
    const x = priceToX(p);
    ctx.fillText(fmtSmart(p), x, H_CSS - PAD_B + 16);
    ctx.strokeStyle = '#1e2d45';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x, H_CSS - PAD_B);
    ctx.lineTo(x, H_CSS - PAD_B + 5);
    ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  const assets = calcAll();
  renderKPIs(assets);
  renderTable(assets);
  renderDonut(assets);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderAll(); // render with fallback prices first
  fetchAllPrices();
});
