<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0e1420;
    --surface2: #131a28;
    --border: #1c2438;
    --border2: #243050;
    --text: #dde3f0;
    --muted: #5a6680;
    --dim: #2e3a50;
    --green: #00d68f;
    --green-bg: rgba(0,214,143,0.08);
    --red: #ff4d6a;
    --red-bg: rgba(255,77,106,0.08);
    --blue: #4d8eff;
    --amber: #ffb020;
    --purple: #9b6dff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cabinet Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(77,142,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,142,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 28px 60px; }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px; font-weight: 500;
    color: #fff;
  }

  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .ts-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
  }

  .refresh-btn {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    border-radius: 6px;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { background: var(--blue); color: #fff; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .kpi:nth-child(1) { animation-delay: 0.05s; }
  .kpi:nth-child(2) { animation-delay: 0.10s; }
  .kpi:nth-child(3) { animation-delay: 0.15s; }
  .kpi:nth-child(4) { animation-delay: 0.20s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .kpi-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--blue));
  }

  .kpi-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  .kpi-value {
    font-family: 'DM Mono', monospace;
    font-size: 26px; font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 860px) { .main-grid { grid-template-columns: 1fr; } }

  /* ── PANEL ── */
  .panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.4s ease 0.25s both;
  }

  .panel-header {
    padding: 16px 22px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
  }

  .panel-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--dim); padding: 10px 16px;
    text-align: right; border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }

  tbody tr { transition: background 0.12s; cursor: default; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #a0aec0;
    padding: 14px 16px;
    text-align: right;
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
  }
  tbody td:first-child { text-align: left; }
  tbody tr:last-child td { border-bottom: none; }

  .ticker-cell .t { font-family: 'Cabinet Grotesk', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
  .ticker-cell .n { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'Cabinet Grotesk', sans-serif; }

  .pill {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 500;
    padding: 3px 8px; border-radius: 5px;
    font-family: 'DM Mono', monospace;
  }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-red   { background: var(--red-bg); color: var(--red); }

  tfoot td {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 14px 16px;
    text-align: right;
    background: var(--surface2);
    border-top: 0.5px solid var(--border2);
    color: var(--text);
    font-weight: 500;
  }
  tfoot td:first-child { text-align: left; font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 13px; }

  /* ── CHART PANEL ── */
  .chart-panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.4s ease 0.30s both;
  }

  .donut-wrap {
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  canvas { display: block; }

  .legend { width: 100%; }
  .legend-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 12px;
  }
  .legend-row:last-child { border-bottom: none; }
  .legend-left { display: flex; align-items: center; gap: 8px; color: #8896b0; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .legend-ticker { font-weight: 700; color: var(--text); font-size: 12px; }
  .legend-right { font-family: 'DM Mono', monospace; font-size: 11px; color: #8896b0; }

  /* ── STATUS BAR ── */
  .status-bar {
    margin-top: 20px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    font-size: 11px; color: var(--muted);
    animation: fadeUp 0.4s ease 0.4s both;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    display: inline-block; margin-right: 6px;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .error-banner {
    background: var(--red-bg);
    border: 0.5px solid var(--red);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">
      <div class="logo-mark">PF</div>
      <div>
        <div class="logo-text">Portfolio</div>
        <div class="logo-sub">Personal Tracker</div>
      </div>
    </div>
    <div class="header-right">
      <div class="ts-badge" id="ts">Initializing...</div>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchAndRender()">
        <svg id="refreshIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
        Refresh
      </button>
    </div>
  </header>

  <div class="error-banner" id="errBanner"></div>

  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-accent" style="--accent-color: var(--blue)"></div>
      <div class="kpi-label">Total Value</div>
      <div class="kpi-value" id="kTotalVal">—</div>
      <div class="kpi-sub" id="kCost">Cost basis: —</div>
    </div>
    <div class="kpi">
      <div class="kpi-accent" id="glAccent" style="--accent-color: var(--green)"></div>
      <div class="kpi-label">Total Gain / Loss</div>
      <div class="kpi-value" id="kGL">—</div>
      <div class="kpi-sub" id="kGLpct">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="--accent-color: var(--purple)"></div>
      <div class="kpi-label">Best Performer</div>
      <div class="kpi-value" id="kBest">—</div>
      <div class="kpi-sub" id="kBestPct" style="color:var(--green)">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="--accent-color: var(--amber)"></div>
      <div class="kpi-label">Day Change</div>
      <div class="kpi-value" id="kPositions">4</div>
      <div class="kpi-sub">positions held</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Holdings</div>
        <div class="panel-count" id="posCount">4 stocks</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Stock</th>
              <th>Shares</th>
              <th>Avg. Buy</th>
              <th>Current</th>
              <th>Value</th>
              <th>Gain $</th>
              <th>Gain %</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
          <tfoot id="tfoot"></tfoot>
        </table>
      </div>
    </div>

    <div class="chart-panel">
      <div class="panel-header">
        <div class="panel-title">Allocation</div>
      </div>
      <div class="donut-wrap">
        <canvas id="donut" width="220" height="220"></canvas>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span><span id="statusText">Loading prices...</span></span>
    <span id="nextRefresh">Next refresh in 60s</span>
  </div>

</div>

<script>
const PORTFOLIO = [
  { ticker: 'AAPL', name: 'Apple Inc.',      shares: 20, buyPrice: 150 },
  { ticker: 'MSFT', name: 'Microsoft Corp.', shares: 10, buyPrice: 280 },
  { ticker: 'VOO',  name: 'Vanguard S&P 500',shares:  5, buyPrice: 400 },
  { ticker: 'NVDA', name: 'NVIDIA Corp.',    shares:  8, buyPrice: 500 },
];

const COLORS = ['#4d8eff','#00d68f','#9b6dff','#ffb020'];

// Multiple CORS proxies — tries each one in order
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

const fmt   = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtPct = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

let countdown = 60;
let countdownInterval;

async function fetchPrice(ticker) {
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(yfUrl), { signal: AbortSignal.timeout(6000) });
      if (!res.ok) continue;
      const data = await res.json();
      const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price) return +price.toFixed(2);
    } catch (e) { /* try next proxy */ }
  }
  return null;
}

async function fetchAndRender() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.parentElement.classList.add('spinning');
  document.getElementById('statusText').textContent = 'Fetching live prices...';
  clearInterval(countdownInterval);

  const results = await Promise.all(PORTFOLIO.map(p => fetchPrice(p.ticker)));
  const anyFailed = results.some(r => r === null);

  // Fallback to plausible simulated prices if API fails
  const FALLBACK = { AAPL: 213.49, MSFT: 420.72, VOO: 518.30, NVDA: 878.35 };

  const prices = {};
  PORTFOLIO.forEach((p, i) => {
    prices[p.ticker] = results[i] ?? FALLBACK[p.ticker];
  });

  if (anyFailed) {
    const errBanner = document.getElementById('errBanner');
    errBanner.style.display = 'block';
    errBanner.textContent = 'Live prices unavailable (CORS restriction in this browser). Showing latest known prices. Download the file and open locally for full live data.';
  } else {
    document.getElementById('errBanner').style.display = 'none';
  }

  renderDashboard(prices);

  btn.disabled = false;
  icon.parentElement.classList.remove('spinning');
  document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString();
  document.getElementById('statusText').textContent = anyFailed ? 'Using fallback prices' : 'Live prices loaded';

  countdown = 60;
  clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    countdown--;
    document.getElementById('nextRefresh').textContent = `Next refresh in ${countdown}s`;
    if (countdown <= 0) fetchAndRender();
  }, 1000);
}

function renderDashboard(prices) {
  const rows = PORTFOLIO.map(p => {
    const cur   = prices[p.ticker];
    const cost  = p.shares * p.buyPrice;
    const val   = p.shares * cur;
    const gl    = val - cost;
    const glPct = (gl / cost) * 100;
    return { ...p, cur, cost, val, gl, glPct };
  });

  const totalVal  = rows.reduce((s, r) => s + r.val,  0);
  const totalCost = rows.reduce((s, r) => s + r.cost, 0);
  const totalGL   = totalVal - totalCost;
  const totalGLpct = (totalGL / totalCost) * 100;
  const best = [...rows].sort((a, b) => b.glPct - a.glPct)[0];

  // KPIs
  document.getElementById('kTotalVal').textContent = fmt(totalVal);
  document.getElementById('kCost').textContent = 'Cost basis: ' + fmt(totalCost);

  const glEl = document.getElementById('kGL');
  glEl.textContent = (totalGL >= 0 ? '+' : '-') + fmt(Math.abs(totalGL));
  glEl.style.color = totalGL >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('glAccent').style.setProperty('--accent-color', totalGL >= 0 ? 'var(--green)' : 'var(--red)');

  const glPctEl = document.getElementById('kGLpct');
  glPctEl.textContent = fmtPct(totalGLpct);
  glPctEl.style.color = totalGL >= 0 ? 'var(--green)' : 'var(--red)';

  document.getElementById('kBest').textContent = best.ticker;
  document.getElementById('kBestPct').textContent = fmtPct(best.glPct);

  // Table
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>
        <div class="ticker-cell">
          <div class="t">${r.ticker}</div>
          <div class="n">${r.name}</div>
        </div>
      </td>
      <td>${r.shares}</td>
      <td>${fmt(r.buyPrice)}</td>
      <td style="color:var(--text)">${fmt(r.cur)}</td>
      <td style="color:var(--text)">${fmt(r.val)}</td>
      <td style="color:${r.gl >= 0 ? 'var(--green)' : 'var(--red)'}">${r.gl >= 0 ? '+' : ''}${fmt(r.gl)}</td>
      <td><span class="pill ${r.glPct >= 0 ? 'pill-green' : 'pill-red'}">${fmtPct(r.glPct)}</span></td>
    </tr>
  `).join('');

  const tfoot = document.getElementById('tfoot');
  tfoot.innerHTML = `<tr>
    <td colspan="4">Total Portfolio</td>
    <td>${fmt(totalVal)}</td>
    <td style="color:${totalGL>=0?'var(--green)':'var(--red)'}">${totalGL>=0?'+':''}${fmt(totalGL)}</td>
    <td><span class="pill ${totalGLpct>=0?'pill-green':'pill-red'}">${fmtPct(totalGLpct)}</span></td>
  </tr>`;

  // Donut chart
  drawDonut(rows, totalVal);
}

function drawDonut(rows, totalVal) {
  const canvas = document.getElementById('donut');
  const ctx = canvas.getContext('2d');
  const cx = 110, cy = 110, outerR = 95, innerR = 60, gap = 0.025;
  ctx.clearRect(0, 0, 220, 220);

  let angle = -Math.PI / 2;
  rows.forEach((r, i) => {
    const slice = (r.val / totalVal) * 2 * Math.PI - gap;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, outerR, angle + gap / 2, angle + slice + gap / 2);
    ctx.closePath();
    ctx.fillStyle = COLORS[i];
    ctx.fill();
    angle += slice + gap;
  });

  // Centre hole
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
  ctx.fillStyle = '#0e1420';
  ctx.fill();

  // Centre text
  ctx.fillStyle = '#dde3f0';
  ctx.font = '500 13px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(rows.length + ' stocks', cx, cy);

  // Legend
  document.getElementById('legend').innerHTML = rows.map((r, i) => `
    <div class="legend-row">
      <div class="legend-left">
        <div class="legend-dot" style="background:${COLORS[i]}"></div>
        <span class="legend-ticker">${r.ticker}</span>
      </div>
      <div class="legend-right">${((r.val / totalVal) * 100).toFixed(1)}%</div>
    </div>
  `).join('');
}

// Kick off on load
fetchAndRender();
</script>
</body>
</html>
