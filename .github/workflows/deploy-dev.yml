name: Deploy Modular_Dev to /dev/
 
on:
  push:
    branches: [Modular_Dev]
  workflow_dispatch:  # Allows manual trigger from Actions tab
 
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Modular_Dev branch
        uses: actions/checkout@v4
        with:
          ref: Modular_Dev
      
      - name: Deploy to GitHub Pages /dev/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: dev
          keep_files: true  # Preserves main branch files at root
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Modular_Dev branch to /dev/ subdirectory'
