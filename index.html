<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitPleb Dashboard</title>
</head>
<body>
    <script>
        // Fetch and inject the dashboard content WITHOUT changing URL
        fetch('./BitPleb-dashboard.html')
            .then(response => response.text())
            .then(html => {
                document.documentElement.innerHTML = html;
                // Keep the clean URL in address bar
                history.replaceState(null, '', './');
            })
            .catch(error => {
                console.error('Failed to load dashboard:', error);
                document.body.innerHTML = '<p>Error loading dashboard. Please refresh.</p>';
            });
    </script>
</body>
</html>
